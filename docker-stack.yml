# =============================================================================
# Dungeon Descent — Stack Portainer (Docker Swarm + Traefik)
# Domínio: dungeon.muhbianco.com.br
# Rede: chatbot-net (mesma do Traefik)
# Imagem: muhrilobianco/dungeon_descent:latest (Docker Hub)
# DB: MariaDB do HOST (preencher envs no Portainer)
#
# Fluxo:
# 1. Criar DB + schema (sql/schema.sql) no MariaDB da máquina
# 2. ./build.sh prod
# 3. Portainer → Stacks → colar este YAML → preencher envs → Deploy
# =============================================================================

version: "3.8"

services:
  dungeon_descent:
    image: muhrilobianco/dungeon_descent:latest
    environment:
      NODE_ENV: production
      PORT: "3000"
      CORS_ORIGIN: https://dungeon.muhbianco.com.br
      PUBLIC_URL: https://dungeon.muhbianco.com.br
      DB_HOST: host.docker.internal
      DB_PORT: "3306"
      DB_USER: ""
      DB_PASSWORD: ""
      DB_NAME: ""
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - chatbot-net
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      update_config:
        order: start-first
        failure_action: rollback
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.10"
          memory: 128M
      labels:
        - traefik.enable=true
        - traefik.docker.network=chatbot-net
        - traefik.http.routers.dungeon_descent.rule=Host(`dungeon.muhbianco.com.br`)
        - traefik.http.routers.dungeon_descent.entrypoints=websecure
        - traefik.http.routers.dungeon_descent.tls.certresolver=letsencryptresolver
        - traefik.http.routers.dungeon_descent.priority=1
        - traefik.http.routers.dungeon_descent.service=dungeon_descent
        - traefik.http.routers.dungeon_descent.middlewares=dungeon_descent_headers
        - traefik.http.services.dungeon_descent.loadbalancer.server.port=3000
        - traefik.http.services.dungeon_descent.loadbalancer.passHostHeader=true
        - traefik.http.middlewares.dungeon_descent_headers.headers.stsSeconds=31536000
        - traefik.http.middlewares.dungeon_descent_headers.headers.stsIncludeSubdomains=true
        - traefik.http.middlewares.dungeon_descent_headers.headers.contentTypeNosniff=true
        - traefik.http.middlewares.dungeon_descent_headers.headers.browserXssFilter=true
        - traefik.http.middlewares.dungeon_descent_headers.headers.referrerPolicy=no-referrer
        - traefik.http.middlewares.dungeon_descent_headers.headers.customFrameOptionsValue=DENY
        - traefik.http.middlewares.dungeon_descent_headers.headers.permissionsPolicy=camera=(), microphone=(), geolocation=()

networks:
  chatbot-net:
    external: true
    name: chatbot-net
